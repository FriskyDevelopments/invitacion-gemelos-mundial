kind = "web"
previewPath = "/"
title = "Invitación Gemelos Mundial"
version = "1.0.0"
id = "artifacts/invitacion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18599

[services.development]
run = "pnpm --filter @workspace/invitacion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/invitacion", "run", "build" ]
publicDir = "artifacts/invitacion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18599"
BASE_PATH = "/"
