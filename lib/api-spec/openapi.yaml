openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rsvps
    description: RSVP confirmations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /rsvps:
    get:
      operationId: listRsvps
      tags: [rsvps]
      summary: List all RSVPs
      responses:
        "200":
          description: List of RSVPs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RsvpList"
    post:
      operationId: createRsvp
      tags: [rsvps]
      summary: Submit an RSVP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRsvpBody"
      responses:
        "201":
          description: RSVP created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rsvp"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateRsvpBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        count:
          type: integer
          minimum: 1
          maximum: 10
      required:
        - name
        - count
    Rsvp:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        count:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - count
        - createdAt
    RsvpList:
      type: object
      properties:
        rsvps:
          type: array
          items:
            $ref: "#/components/schemas/Rsvp"
        total:
          type: integer
          description: Total number of guests confirmed
      required:
        - rsvps
        - total
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
